name: Collect Air Quality Data

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run data collection script
        env:
          IQAIR_API_KEY: ${{ secrets.IQAIR_API_KEY }}
        run: python scripts/collect_data.py

      - name: Commit and push updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/air_quality_history.csv
          git diff --staged --quiet && echo "No changes to commit" || git commit -m "Add hourly air quality data point"
          git push